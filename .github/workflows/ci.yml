name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Elixir)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          elixir-version: "1.17"
      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: backend/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('backend/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Cache build
        uses: actions/cache@v4
        with:
          path: backend/_build
          key: ${{ runner.os }}-build-${{ hashFiles('backend/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix test --cover
      - name: Generate docs
        run: mix docs

  dashboard:
    name: Dashboard (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Run tests with coverage
        run: npm test -- --browsers=ChromeHeadlessCI --code-coverage --watch=false
        env:
          CHROME_BIN: /usr/bin/google-chrome

  pipelines:
    name: Pipelines (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipelines
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry
      - name: Cache Poetry venv
        uses: actions/cache@v4
        with:
          path: pipelines/.venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('pipelines/poetry.lock') }}
          restore-keys: ${{ runner.os }}-poetry-
      - run: poetry install
      - run: poetry run ruff check .
      - run: poetry run ruff format --check .
      - run: poetry run pytest
