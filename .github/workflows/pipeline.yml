name: Run Data Pipeline

on:
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Pipeline to run"
        required: true
        default: "augment"
        type: choice
        options:
          - augment
  schedule:
    # Run daily at 03:00 UTC (after Augment data availability at ~02:00 UTC)
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  run-pipeline:
    name: Execute Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        id: check
        env:
          AUGMENT_API_URL: ${{ secrets.AUGMENT_API_URL }}
          AUGMENT_API_TOKEN: ${{ secrets.AUGMENT_API_TOKEN }}
        run: |
          if [ -z "$AUGMENT_API_URL" ] || [ -z "$AUGMENT_API_TOKEN" ]; then
            echo "::warning::AUGMENT_API_URL or AUGMENT_API_TOKEN secret is not configured — skipping pipeline."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: "3.12"

      - name: Install Poetry
        if: steps.check.outputs.skip == 'false'
        run: pip install poetry

      - name: Run pipeline
        if: steps.check.outputs.skip == 'false'
        env:
          AUGMENT_API_URL: ${{ secrets.AUGMENT_API_URL }}
          AUGMENT_API_TOKEN: ${{ secrets.AUGMENT_API_TOKEN }}
        run: |
          ./tools/pipeline_runner \
            --pipeline ${{ github.event.inputs.pipeline || 'augment' }} \
            --output data/

      - name: Commit updated data
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update ${{ github.event.inputs.pipeline || 'augment' }} data [skip ci]"
          git push
