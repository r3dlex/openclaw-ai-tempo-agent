name: Run Data Pipeline

on:
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Pipeline to run"
        required: true
        default: "augment"
        type: choice
        options:
          - augment
  schedule:
    # Run daily at 03:00 UTC (after Augment data availability at ~02:00 UTC)
    - cron: "0 3 * * *"

jobs:
  run-pipeline:
    name: Execute Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Run pipeline
        env:
          AUGMENT_API_URL: ${{ secrets.AUGMENT_API_URL }}
          AUGMENT_API_TOKEN: ${{ secrets.AUGMENT_API_TOKEN }}
        run: |
          ./tools/pipeline_runner \
            --pipeline ${{ github.event.inputs.pipeline || 'augment' }} \
            --output data/

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update ${{ github.event.inputs.pipeline || 'augment' }} data [skip ci]"
          git push
